repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format check
        entry: ruff format --check
        language: system
        types: [python]
      - id: no-private-env
        name: reject private environment files
        entry: Private environment files must not be committed
        language: fail
        files: (^|/)\.env($|\.)
        exclude: ^\.env\.example$
