name: Feature request
description: Suggest an improvement to the standalone MCP server
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the desired tool, guardrail, or documentation change.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Project scope
      options:
        - label: This request is limited to the MCP server or its bundled API client.
          required: true
